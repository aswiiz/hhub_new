{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
        <p class="text-muted">Login to access your Health Care Hub.</p>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST" class="auth-form">
            <div class="form-group">
                <label for="identifier">Username or Phone</label>
                <input type="text" id="identifier" name="identifier" class="form-control"
                    placeholder="Enter username or phone" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="/register">Register here</a></p>
    </div>
</div>
{% endblock %}
