{% extends "base.html" %}

{% block content %}
<div class="admin-header">
    <h1><i class="fas fa-users-cog"></i> Admin Dashboard</h1>
    <div class="admin-actions">
        <a href="/register" class="btn btn-primary"><i class="fas fa-user-plus"></i> Create New User</a>
        <a href="/admin/logout" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Logout Admin</a>
    </div>
</div>

<div class="card">
    <h2>User Management</h2>
    <div class="table-container">
        <table class="history-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone }}</td>
                    <td class="admin-table-actions">
                        <a href="/admin/user/logs/{{ user._id }}" class="btn btn-sm btn-outline"><i
                                class="fas fa-history"></i> Logs</a>
                        <a href="/admin/user/edit/{{ user._id }}" class="btn btn-sm btn-secondary"><i
                                class="fas fa-edit"></i> Edit</a>
                        <form action="/admin/user/delete/{{ user._id }}" method="POST" style="display:inline;"
                            onsubmit="return confirm('Are you sure you want to delete this user and all their health history?')">
                            <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i>
                                Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
