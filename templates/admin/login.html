{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2><i class="fas fa-user-shield"></i> Admin Portal</h2>
        <p class="text-muted">Login with admin credentials to manage users.</p>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form action="/admin/login" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login as Admin</button>
        </form>
    </div>
</div>
{% endblock %}
